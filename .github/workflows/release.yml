name: Create Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v7.0.0

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Set up JDK 25
        uses: actions/setup-java@v5.5.0
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6.2.0
        with:
          cache-cleanup: on-success
          cache-encryption-key: "${{ secrets.GRADLE_ENCRYPTION_KEY }}"

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract project name
        id: project
        shell: bash
        run: |
          PROJECT_NAME="$(./gradlew properties --quiet --console=plain | awk -F': ' '$1 == "name" { print $2; exit }')"

          if [[ -z "$PROJECT_NAME" ]]; then
            echo "Gradle project name could not be resolved." >&2
            exit 1
          fi

          echo "name=$PROJECT_NAME" >> "$GITHUB_OUTPUT"

      - name: Build stable release with Gradle
        env:
          GITHUB_ACTOR: "${{ github.actor }}"
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: "./gradlew build --configuration-cache --build-cache --parallel -Prelease=true -PversionOverride=${{ steps.version.outputs.version }}"

      - name: Prepare release notes
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t RELEASE_ARTIFACTS < <(find build/libs -maxdepth 1 -type f -name '*.jar' | sort)

          if [[ "${#RELEASE_ARTIFACTS[@]}" -eq 0 ]]; then
            echo "No release artifact found in build/libs." >&2
            exit 1
          fi

          if [[ "${#RELEASE_ARTIFACTS[@]}" -gt 1 ]]; then
            echo "Multiple release artifacts found in build/libs:" >&2
            printf ' - %s\n' "${RELEASE_ARTIFACTS[@]}" >&2
            exit 1
          fi

          ARTIFACT_PATH="${RELEASE_ARTIFACTS[0]}"
          ARTIFACT_NAME="$(basename "$ARTIFACT_PATH")"
          ARTIFACT_SIZE="$(du -h "$ARTIFACT_PATH" | cut -f1)"
          ARTIFACT_SHA256="$(sha256sum "$ARTIFACT_PATH" | awk '{ print $1 }')"
          CHECKSUM_PATH="${ARTIFACT_PATH}.sha256"
          RELEASE_NOTES_PATH="${{ github.workspace }}/build/release-notes.md"

          printf "%s  %s\n" "$ARTIFACT_SHA256" "$ARTIFACT_NAME" > "$CHECKSUM_PATH"

          {
            echo "## Summary"
            echo
            echo "| Info | Valeur / Value |"
            echo "| --- | --- |"
            echo "| Version | \`${{ steps.version.outputs.version }}\` |"
            echo "| File | \`${ARTIFACT_NAME}\` |"
            echo "|  Size | \`${ARTIFACT_SIZE}\` |"
            echo
            echo "**Download**"
            echo
            echo "- Download \`${ARTIFACT_NAME}\` from the assets of this release."
            echo "- \`${ARTIFACT_NAME}.sha256\` can be used to verify the file integrity."
            echo
            echo "### SHA-256"
            echo
            echo '```text'
            echo "${ARTIFACT_SHA256}"
            echo '```'
          } > "$RELEASE_NOTES_PATH"

          echo "path=$RELEASE_NOTES_PATH" >> "$GITHUB_OUTPUT"
          echo "artifact=$ARTIFACT_PATH" >> "$GITHUB_OUTPUT"
          echo "checksum=$CHECKSUM_PATH" >> "$GITHUB_OUTPUT"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v3.0.2
        with:
          name: ${{ steps.project.outputs.name }} • ${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          body_path: ${{ steps.release_notes.outputs.path }}
          draft: false
          prerelease: false
          make_latest: "true"
          generate_release_notes: true
          fail_on_unmatched_files: true
          preserve_order: true
          overwrite_files: true
          files: |
            ${{ steps.release_notes.outputs.artifact }}
            ${{ steps.release_notes.outputs.checksum }}
          token: ${{ secrets.GITHUB_TOKEN }}
